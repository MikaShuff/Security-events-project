image: node:20

definitions:
  caches:
    npm: ~/.npm

pipelines:
  default:
    - step:
        name: Install dependencies
        caches:
          - npm
        script:
          - npm ci
          # - npm install -g @angular/cli

    - step:
        name: Test Angular
        caches:
          - npm
        script:
          - npm ci 
          # Install Chromium
          - apt-get update && apt-get install -y chromium

          # Tell Karma where Chromium is
          - export CHROME_BIN=/usr/bin/chromium

          - npm test -- --watch=false --browsers=ChromeHeadlessCI

    - step:
        name: Build Angular
        caches:
          - npm
        script:
          - node -v
          - npm -v
          - npm ci
          - npm run build
  
  pull-requests:
    '**':
      - step:
          name: PR - Test Angular
          caches:
            - npm
          script:
            - npm ci
             # Install Chromium
            - apt-get update && apt-get install -y chromium

            # Tell Karma where Chromium is
            - export CHROME_BIN=/usr/bin/chromium

            - npm test -- --watch=false --browsers=ChromeHeadlessCI