<!-- src/app/core/header/header.component.html -->

<header id="app-header" class="topbar" dir="rtl">
  <!-- right: logo (RTL right side) -->
  <a class="logo-container" routerLink="/" (click)="closeMenus()">
    <img
      src="assets/images/logo.png"
      alt="שופרסל - דף הבית"
      class="logo-img"
    />
  </a>

  <!-- center: title -->
  <div class="topbar-title" aria-label="שם המערכת">
    מערכת ניהול אירועי ביטחון
  </div>

  <!-- left: user + logout -->
  <div class="user-area">
    <div class="userbox" *ngIf="me$ | async as me; else guest">
      שלום, <strong>{{ me.username }}</strong>
      <span class="role">({{ me.role }})</span>
    </div>
    <ng-template #guest>
      <div class="userbox">שלום, אורח</div>
    </ng-template>

    <button
      class="btn logout-btn"
      type="button"
      (click)="logout()"
      *ngIf="isLoggedIn$ | async"
    >
      יציאה
    </button>
  </div>
</header>
