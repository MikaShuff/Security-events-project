<!-- login.component.html -->
<div class="login-wrapper" dir="rtl">
  <div class="login-card">
    <h2>כניסה למערכת</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" autoComplete="off">
      <div class="field">
        <label>שם משתמש</label>
        <input type="text" formControlName="username" />
      </div>

      <!-- Password -->
      <div class="field">
        <label for="password">סיסמה</label>

        <div class="password-wrap">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
          />

          <button
            type="button"
            class="pw-toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'הסתר סיסמה' : 'הצג סיסמה'"
            [attr.title]="showPassword ? 'הסתר' : 'הצג'"
          >
            <!-- eye -->
            <svg
              *ngIf="!showPassword"
              viewBox="0 0 24 24"
              aria-hidden="true"
              class="pw-icon"
            >
              <path
                fill="currentColor"
                d="M12 5c5.5 0 9.6 4.2 10.9 6.5a1 1 0 0 1 0 1C21.6 14.8 17.5 19 12 19S2.4 14.8 1.1 12.5a1 1 0 0 1 0-1C2.4 9.2 6.5 5 12 5Zm0 2C7.8 7 4.5 10.2 3.2 12c1.3 1.8 4.6 5 8.8 5s7.5-3.2 8.8-5C19.5 10.2 16.2 7 12 7Zm0 2.5A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5Z"
              />
            </svg>

            <!-- eye-slash -->
            <svg
              *ngIf="showPassword"
              viewBox="0 0 24 24"
              aria-hidden="true"
              class="pw-icon"
            >
              <path
                fill="currentColor"
                d="M3.3 2.6 21.4 20.7l-1.4 1.4-3-3c-1.5.6-3.2.9-5 .9-5.5 0-9.6-4.2-10.9-6.5a1 1 0 0 1 0-1c.8-1.2 2.3-3 4.5-4.3l-3-3 1.6-1.6ZM7 8.7c-1.5 1-2.7 2.3-3.5 3.3 1.3 1.8 4.6 5 8.5 5 1.2 0 2.3-.2 3.3-.5l-1.7-1.7a2.5 2.5 0 0 1-3.4-3.4L7 8.7ZM12 5c5.5 0 9.6 4.2 10.9 6.5a1 1 0 0 1 0 1c-.5.8-1.3 1.9-2.4 2.9l-1.4-1.4c.8-.8 1.4-1.6 1.7-2-1.3-1.8-4.6-5-8.8-5-1 0-2 .2-2.9.4L7.9 6.2C9.2 5.5 10.6 5 12 5Z"
              />
            </svg>
          </button>
        </div>
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>

      <!-- Submit/Login area -->

      <div class="loading-box" *ngIf="loading; else actions">
        <div class="spinner big" aria-label="מתחבר..."></div>
        <div class="loading-text">מתחבר...</div>
      </div>

      <ng-template #actions>
        <button type="submit">כניסה</button>
      </ng-template>
    </form>
  </div>
</div>
