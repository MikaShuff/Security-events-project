<h1 class="branches-title" align="right">טבלת סוגי אירועים</h1>

<!-- TOOLBAR כמו בסניפים/אירועים -->
<div class="toolbar">
  <button class="btn-primary" (click)="onAdd()">הוספה</button>

  <div class="filters">
    <!-- סינון בלייב: תואם ל-TS שלך -->
    <input [(ngModel)]="filter.id"   type="text" placeholder="קוד" />
    <input [(ngModel)]="filter.name" type="text" placeholder="שם סוג אירוע" />
  </div>
</div>

<!-- טבלה -->
<table>
  <thead>
    <tr>
      <th (click)="sortBy('id')"   [class.sorted]="sort.key==='id'">קוד</th>
      <th (click)="sortBy('name')" [class.sorted]="sort.key==='name'">שם סוג אירוע</th>
      <th>פעולות</th>
    </tr>
  </thead>

  <tbody>
    <!-- שימוש ב-filtered (getter) שלך כדי לשמור על סינון לייב -->
    <tr *ngFor="let row of filtered; trackBy: trackById">
      <td>{{ row.id }}</td>

      <td *ngIf="!row._edit">{{ row.name }}</td>
      <td *ngIf="row._edit">
        <input [(ngModel)]="row.name" placeholder="שם סוג אירוע" />
      </td>

      <td class="actions">
        <!-- מצב תצוגה -->
        <button class="btn-edit"   *ngIf="!row._edit" (click)="startEdit(row)">✏️</button>
        <button class="btn-delete" *ngIf="!row._edit" (click)="onDelete(row)">🗑️</button>

        <!-- מצב עריכה -->
        <button class="btn-save"   *ngIf="row._edit" (click)="saveRow(row)">✔️</button>
        <button class="btn-cancel" *ngIf="row._edit" (click)="cancelEdit(row)">❌</button>
      </td>
    </tr>

    <tr *ngIf="!filtered.length">
      <td colspan="3" class="empty">לא נמצאו נתונים</td>
    </tr>
  </tbody>
</table>
