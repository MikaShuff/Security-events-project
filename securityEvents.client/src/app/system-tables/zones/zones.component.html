<h1 class="branches-title" align="right">טבלת קשר סנ"פ-אוזר</h1>
<div class="toolbar">
  <button class="btn-primary" (click)="load()">רענון</button>

  <div class="filters">
    <input [(ngModel)]="filter.id" type="text" placeholder="סינון לפי קוד" />
    <input [(ngModel)]="filter.name" type="text" placeholder="סינון לפי שם" />
  </div>
</div>

<table>
  <thead>
    <tr>
      <th>קוד אזור</th>
      <th>שם אזור</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let r of filtered; trackBy: trackById">
      <td>{{ r.id }}</td>
      <td>{{ r.name }}</td>
    </tr>
  </tbody>
</table>
